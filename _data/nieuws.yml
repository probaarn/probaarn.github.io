- titel: Progressief Baarn wil ambitieuzer klimaatplan voor gemeente
  datum: 2026-04-02
  categorie: klimaat
  uitgelicht: true
  icoon: "🌱"
  kleur: "groen"
  intro: >
    Progressief Baarn heeft in de gemeenteraad gepleit voor een versnelling
    van het gemeentelijk klimaatbeleid. Baarn moet in 2040 klimaatneutraal
    zijn, niet in 2050 zoals het college voorstelt. "We hebben geen tijd
    te verliezen", aldus fractievoorzitter Thomas Bakker.
  url: "#"

