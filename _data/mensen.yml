# ────────────────────────────────────────────────
# MENSEN — raadsleden en bestuursleden van
# Sociaal Democraten Baarn.
#
# portefeuilles: gebruik de 'id' uit dossiers.yml
# foto: bestandsnaam in assets/fotos/ (of leeg laten)
# Foto's zijn beschikbaar via baarn.pvda.nl/wieiswie/
# ────────────────────────────────────────────────

raadsleden:
  - naam: Mark Eijbaard
    functie: Fractievoorzitter & Raadslid
    partij: sd
    portefeuilles:
      - communicatie
      - ons-baarn
      - wonen
    bio: >
      Mark is fractievoorzitter van Sociaal Democraten Baarn en zet zich
      al jaren in voor sociale rechtvaardigheid, betaalbaar wonen en een
      transparant gemeentebestuur. Hij is nauw betrokken bij de Baarnse
      samenleving en spreekt bewoners aan op straat én in de raadszaal.
    email: m.eijbaard@baarn.nl
    foto:

  - naam: Marjolijn van Dijk
    functie: Raadslid
    partij: sd
    portefeuilles:
      - welzijn-preventie
      - ons-baarn
    bio: >
      Marjolijn is raadslid met een achtergrond in de zorg. Ze pleit voor
      toegankelijke zorg voor iedereen en preventief beleid dat problemen
      aanpakt voordat ze escaleren. Ze is het aanspreekpunt voor welzijn
      en zorg in de Baarnse raad.
    email: m.vandijk@baarn.nl
    foto:

  - naam: Sandra Bruijstens
    functie: Raadslid
    partij: sd
    portefeuilles:
      - energietransitie
      - duurzaamheid-natuur
    bio: >
      Sandra is raadslid en zet zich in voor een duurzaam Baarn. Ze volgt
      de energietransitie op de voet en zorgt dat ook huurders en mensen
      met een lager inkomen kunnen profiteren van duurzame energie en
      betere isolatie.
    email: s.bruijstens@baarn.nl
    foto:

  - naam: Valentijn Brinkman
    functie: Raadslid
    partij: sd
    portefeuilles:
      - wonen
      - communicatie
    bio: >
      Valentijn is raadslid en richt zich op betaalbaar wonen en eerlijke
      communicatie met inwoners. Hij stelt kritische vragen over
      nieuwbouwplannen en zorgt dat bewoners tijdig worden betrokken bij
      beslissingen die hun wijk raken.
    email: v.brinkman@baarn.nl
    foto:

  - naam: Hind Neggaoui
    functie: Raadslid
    partij: sd
    portefeuilles:
      - welzijn-preventie
      - communicatie
    bio: >
      Hind is raadslid en trekt zich het lot aan van alle Baarnaars die
      zich buitengesloten voelen. Ze strijdt voor gelijke behandeling,
      toegankelijke hulpverlening en een gemeente die iedereen bereikt —
      ook mensen die zichzelf niet luid laten horen.
    email: h.neggaoui@baarn.nl
    foto:

bestuur:
  - naam: Svenja de Groot
    functie: Voorzitter
    partij: sd
    bio: >
      Svenja leidt het bestuur van Sociaal Democraten Baarn en zorgt
      voor de interne organisatie, de samenwerking met de fractie en
      de verbinding met leden en sympathisanten.
    foto:

  - naam: Hans Witsenboer
    functie: Secretaris
    partij: sd
    bio: >
      Hans verzorgt de communicatie van Sociaal Democraten Baarn,
      beheert het ledenbestand en organiseert ledenvergaderingen
      en bijeenkomsten.
    foto:

  - naam: Willy Swinkels
    functie: Penningmeester
    partij: sd
    bio: >
      Willy beheert de financiën van de partij en zorgt voor een
      transparante verantwoording van inkomsten en uitgaven aan
      leden en donateurs.
    foto:
