# ────────────────────────────────────────────────
# DOSSIERS — de zes officiële thema's van
# Sociaal Democraten Baarn (baarn.pvda.nl/themas/)
#
# De 'id' koppelt personen aan dossiers via mensen.yml
# ────────────────────────────────────────────────

- id: communicatie
  naam: Communicatie met inwoners
  icoon: "💬"
  kleur: rood
  omschrijving: >
    Politiek begint bij luisteren. Wij praten niet óver inwoners
    maar mét hen. Bewoners van Baarn moeten echte invloed hebben
    op beslissingen die hun wijk en leven raken.
  uitgebreid: >
    Sociaal Democraten Baarn gelooft dat goed bestuur begint bij
    oprechte communicatie. Wij gaan de wijken in, organiseren
    bewonersavonden en zorgen dat gemeentelijke plannen worden
    uitgelegd op een manier die mensen begrijpen. Participatie
    betekent voor ons: mensen serieus nemen, hun wensen opnemen
    in beslissingen en altijd terugkoppelen wat er met hun input
    is gedaan. Een wethouder of raadslid die luistert, is meer
    waard dan één die alleen zichzelf hoort spreken.
  tags:
    - Burgerparticipatie
    - Transparantie
    - Wijkoverleg
    - Toegankelijk bestuur

- id: ons-baarn
  naam: Ons Baarn
  icoon: "🏡"
  kleur: rood
  omschrijving: >
    Baarn is een bijzondere gemeente. Wij staan voor een leefbaar,
    sociaal en veilig Baarn waar alle inwoners zich thuis voelen —
    van de Brink tot Lage Vuursche en Eembrugge.
  uitgebreid: >
    Ons Baarn is meer dan een mooie gemeente met monumentale
    villa's en bossen. Het is ook de wijk Baarn-Noord, de Brink
    als ontmoetingsplek, de kleine kernen Lage Vuursche en
    Eembrugge. Wij willen dat alle inwoners meedoen aan het
    gemeenschapsleven: jong en oud, nieuwkomer en geboren
    Baarnenaar. Dat vraagt investering in ontmoetingsplekken,
    een levendige Brink, goede voorzieningen in alle kernen en
    een gemeente die oog heeft voor wie buiten de boot dreigt te vallen.
  tags:
    - Leefbaarheid
    - Gemeenschap
    - Brink
    - Lage Vuursche
    - Eembrugge

- id: energietransitie
  naam: Energietransitie
  icoon: "⚡"
  kleur: rood
  omschrijving: >
    De overstap naar duurzame energie is onontkoombaar. Wij willen
    dat Baarn die transitie eerlijk en betaalbaar maakt — ook voor
    mensen met een smalle beurs.
  uitgebreid: >
    De energietransitie is de grootste uitdaging van onze generatie.
    Sociaal Democraten Baarn wil dat Baarn haar steentje bijdraagt
    met zonnepanelen op gemeentelijke gebouwen, ondersteuning voor
    huurders bij warmtepompen en isolatie, en een lokaal energiefonds
    voor inwoners die de overstap zelf niet kunnen betalen. De
    energietransitie mag geen privilege worden van mensen met een
    koopwoning en een goed inkomen. Wij zorgen dat ook kwetsbare
    huishoudens kunnen profiteren van lagere energierekeningen.
  tags:
    - Zonne-energie
    - Warmtepompen
    - Isolatie
    - Energiefonds
    - Huurders

- id: duurzaamheid-natuur
  naam: Duurzaamheid & Natuur
  icoon: "🌿"
  kleur: rood
  omschrijving: >
    Baarn heeft prachtige natuur en groen. Dat bewaren wij voor
    toekomstige generaties — en we breiden het uit met meer
    biodiversiteit in de wijken en klimaatadaptieve inrichting.
  uitgebreid: >
    Het Baarnse Bos, de landgoederen en de natuur rondom Lage
    Vuursche zijn een rijkdom die we moeten koesteren. Maar
    duurzaamheid gaat verder dan behoud: wij willen meer bomen
    in de straten, minder verharding, groene daken en een
    openbare ruimte die klaar is voor de hitte en regenbuien van
    de toekomst. Biodiversiteit begint in de eigen achtertuin en
    op gemeentelijk groen. Elke wijk in Baarn verdient meer groen,
    meer schaduw en meer ruimte voor dieren en planten.
  tags:
    - Biodiversiteit
    - Klimaatadaptatie
    - Baarnse Bos
    - Groene wijken
    - Duurzaam bouwen

- id: wonen
  naam: Wonen
  icoon: "🏠"
  kleur: rood
  omschrijving: >
    Een woning in Baarn moet bereikbaar zijn voor starters en
    mensen met een middeninkomen. Wij strijden tegen speculatie
    en pleiten voor meer sociale huur bij elke nieuwbouw.
  uitgebreid: >
    Wonen is een recht, geen luxe. In Baarn zijn de woningprijzen
    zo hoog opgelopen dat starters, leraren, verpleegkundigen en
    mensen met een middeninkomen nauwelijks nog een woning kunnen
    vinden. Sociaal Democraten Baarn pleit voor anti-speculatie­
    bedingen bij gemeentelijke grondverkopen, een minimumeis van
    30% sociale huur bij nieuwbouw en actieve samenwerking met
    woningcorporaties. Elk jaar dat we niets doen, wordt de
    woningnood groter. Wij kiezen voor daadkracht.
  tags:
    - Sociale huur
    - Starters
    - Anti-speculatie
    - Woningcorporaties
    - Betaalbaar wonen

- id: welzijn-preventie
  naam: Welzijn & Preventie
  icoon: "❤️"
  kleur: rood
  omschrijving: >
    Goede zorg en welzijn voor alle inwoners van Baarn. Investeer
    in preventie zodat problemen worden voorkomen voordat ze
    escaleren. Geen bezuinigingen op de meest kwetsbare mensen.
  uitgebreid: >
    Sociaal Democraten Baarn gelooft in een gemeente die er is
    voor haar inwoners — zeker voor wie het moeilijk heeft.
    Dat betekent: buurtcoaches die proactief ondersteuning bieden,
    inloopcentra voor ouderen en mantelzorgers, en goede jeugdzorg
    zonder wachtlijsten. Preventie is altijd goedkoper dan
    behandeling. Wij willen investeren in vroegsignalering van
    armoede, psychische problemen en huiselijk geweld, zodat
    mensen tijdig de hulp krijgen die ze nodig hebben. Bezuinigen
    op zorg raakt altijd de mensen die al het minst hebben.
  tags:
    - Jeugdzorg
    - Mantelzorg
    - Preventie
    - GGZ
    - Armoede
    - Huiselijk geweld
